# Production-style compose: pulls the custom SR image from ghcr.io.
# No JAR bind-mount, no Maven, no local build. The image has everything
# baked in — same image that runs on EKS will run here.
#
# For local development (editing the Java code), use:
#   docker compose -f docker-compose.dev.yml up
services:

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    hostname: kafka
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: "broker,controller"
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka:9093"
      KAFKA_LISTENERS: "PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093"
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://kafka:9092"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT"
      KAFKA_INTER_BROKER_LISTENER_NAME: "PLAINTEXT"
      KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qk"

  schema-registry:
    # Replace bapuoldtown/schema-registry-extensions with your GitHub path after first push to main.
    # Pin to a version tag (1.0.0) in real deployments — never :latest in prod.
    image: ghcr.io/bapuoldtown/schema-registry-extensions:latest
    hostname: schema-registry
    depends_on: [kafka]
    ports:
      - "8081:8081"
    environment:
      SCHEMA_REGISTRY_HOST_NAME: schema-registry
      SCHEMA_REGISTRY_LISTENERS: "http://0.0.0.0:8081"
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: "PLAINTEXT://kafka:9092"
      # CLASSPATH + RESOURCE_EXTENSION_CLASS are already set via ENV in the
      # Dockerfile — no need to repeat here. Override only if you want to
      # temporarily disable: SCHEMA_REGISTRY_RESOURCE_EXTENSION_CLASS=""
