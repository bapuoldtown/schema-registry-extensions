# GHCR imagePullSecret template.
#
# To create the actual secret in your EKS cluster (DO NOT commit secrets):
#
#   kubectl -n schema-registry create secret docker-registry ghcr-pull-secret \
#     --docker-server=ghcr.io \
#     --docker-username=<your-github-username> \
#     --docker-password=<github-personal-access-token-with-read:packages> \
#     --docker-email=<your-email>
#
# For an organization repo, create the PAT under an org-level service account.
# Better long-term: IRSA + ECR mirror, or GitHub App-based token rotation.
#
# This file is kept in-repo only as documentation — do not apply.
apiVersion: v1
kind: Secret
metadata:
  name: ghcr-pull-secret
  namespace: schema-registry
type: kubernetes.io/dockerconfigjson
# data: REPLACED_AT_APPLY_TIME_VIA_KUBECTL_CREATE_SECRET
