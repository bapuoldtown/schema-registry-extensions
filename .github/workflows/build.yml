# Matrix build + end-to-end verification.
# Each Confluent version: build → push → pull image back → run against Kafka → assert DELETE returns 405.

name: Build & Push Image

on:
  push:
    branches: [main, 'bump-*', 'test-*']
  workflow_dispatch:

jobs:
  build-push-verify:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        confluent-version: ["7.6.1", "7.9.2"]
    name: Build, push & verify for Confluent ${{ matrix.confluent-version }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: maven

      - name: Run tests against Confluent ${{ matrix.confluent-version }}
        run: mvn -B verify -Dconfluent.version=${{ matrix.confluent-version }}

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: block-delete-extension-confluent-${{ matrix.confluent-version }}
          path: target/block-delete-extension-*.jar
          retention-days: 90
          if-no-files-found: error

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags
        id: tags
        run: |
          REPO_LOWER=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          SHA_SHORT=${GITHUB_SHA::7}
          CV="${{ matrix.confluent-version }}"
          PRIMARY="ghcr.io/$REPO_LOWER:cp-$CV"
          if [[ "${{ github.ref }}" == "refs/heads/main" && "$CV" == "7.9.2" ]]; then
            echo "tags=ghcr.io/$REPO_LOWER:latest,$PRIMARY,ghcr.io/$REPO_LOWER:cp-$CV-$SHA_SHORT" >> $GITHUB_OUTPUT
          else
            echo "tags=$PRIMARY,ghcr.io/$REPO_LOWER:cp-$CV-$SHA_SHORT" >> $GITHUB_OUTPUT
          fi
          echo "primary=$PRIMARY" >> $GITHUB_OUTPUT

      - name: Build & push image (Confluent ${{ matrix.confluent-version }})
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          build-args: |
            CONFLUENT_VERSION=${{ matrix.confluent-version }}
          tags: ${{ steps.tags.outputs.tags }}

      # ======================================================================
      # END-TO-END VERIFICATION: pull the image back and run it against Kafka
      # ======================================================================
      - name: Pull image back from GHCR (proves it's available)
        run: docker pull ${{ steps.tags.outputs.primary }}

      - name: Start Kafka + SR with our JAR inside
        run: |
          docker network create sr-test-net
          
          docker run -d --name kafka --network sr-test-net \
            -e KAFKA_NODE_ID=1 \
            -e KAFKA_PROCESS_ROLES="broker,controller" \
            -e KAFKA_CONTROLLER_QUORUM_VOTERS="1@kafka:9093" \
            -e KAFKA_LISTENERS="PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093" \
            -e KAFKA_ADVERTISED_LISTENERS="PLAINTEXT://kafka:9092" \
            -e KAFKA_LISTENER_SECURITY_PROTOCOL_MAP="PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT" \
            -e KAFKA_INTER_BROKER_LISTENER_NAME="PLAINTEXT" \
            -e KAFKA_CONTROLLER_LISTENER_NAMES="CONTROLLER" \
            -e KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=1 \
            -e KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR=1 \
            -e KAFKA_TRANSACTION_STATE_LOG_MIN_ISR=1 \
            -e CLUSTER_ID="MkU3OEVBNTcwNTJENDM2Qk" \
            confluentinc/cp-kafka:${{ matrix.confluent-version }}
          
          docker run -d --name schema-registry --network sr-test-net \
            -p 8081:8081 \
            -e SCHEMA_REGISTRY_HOST_NAME=schema-registry \
            -e SCHEMA_REGISTRY_LISTENERS=http://0.0.0.0:8081 \
            -e SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS=PLAINTEXT://kafka:9092 \
            ${{ steps.tags.outputs.primary }}

      - name: Wait for SR ready
        run: |
          for i in $(seq 1 45); do
            if curl -sf http://localhost:8081/subjects >/dev/null 2>&1; then
              echo "SR ready after $((i*2))s"
              exit 0
            fi
            sleep 2
          done
          echo "SR not ready in 90s"
          docker logs schema-registry --tail 100
          exit 1

      - name: Verify extension banner in logs
        run: |
          if docker logs schema-registry 2>&1 | grep -q "BlockDeleteExtension REGISTERED"; then
            echo "OK: extension banner found"
          else
            echo "ERROR: BlockDeleteExtension banner NOT found in SR logs"
            docker logs schema-registry 2>&1 | tail -80
            exit 1
          fi

      - name: Register a test schema (should succeed, 200)
        run: |
          code=$(curl -s -o /tmp/out -w "%{http_code}" -X POST \
            -H "Content-Type: application/vnd.schemaregistry.v1+json" \
            --data '{"schema":"{\"type\":\"string\"}"}' \
            http://localhost:8081/subjects/ci-test/versions)
          cat /tmp/out; echo
          if [ "$code" != "200" ]; then echo "ERROR: POST returned $code"; exit 1; fi
          echo "OK: POST returned 200"

      - name: THE PROOF — DELETE must return 405 with X-Delete-Blocked header
        run: |
          curl -s -o /tmp/body -D /tmp/headers -w "%{http_code}\n" -X DELETE \
            http://localhost:8081/subjects/ci-test > /tmp/status
          code=$(cat /tmp/status)
          echo "Status: $code"
          echo "Headers:"; cat /tmp/headers
          echo "Body:"; cat /tmp/body; echo
          
          if [ "$code" != "405" ]; then
            echo "FAIL: expected 405, got $code"
            exit 1
          fi
          if ! grep -qi '^X-Delete-Blocked' /tmp/headers; then
            echo "FAIL: X-Delete-Blocked header missing"
            exit 1
          fi
          echo "PASS: DELETE blocked with 405 + X-Delete-Blocked header on Confluent ${{ matrix.confluent-version }}"

      - name: Confirm subject still exists (DELETE didn't leak)
        run: |
          code=$(curl -s -o /tmp/out -w "%{http_code}" http://localhost:8081/subjects/ci-test/versions)
          echo "Status: $code, body: $(cat /tmp/out)"
          if [ "$code" != "200" ]; then echo "ERROR: subject unexpectedly gone"; exit 1; fi

      - name: Collect logs on failure
        if: failure()
        run: |
          echo "======== KAFKA LOGS ========"
          docker logs kafka --tail 60 2>&1 || true
          echo "======== SR LOGS ========"
          docker logs schema-registry --tail 60 2>&1 || true

      - name: Tear down
        if: always()
        run: |
          docker rm -f schema-registry kafka 2>/dev/null || true
          docker network rm sr-test-net 2>/dev/null || true

      - name: Summary
        run: |
          echo "### Confluent ${{ matrix.confluent-version }} — all checks passed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- JAR tested: \`block-delete-extension-confluent-${{ matrix.confluent-version }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- Image: \`${{ steps.tags.outputs.primary }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- DELETE returns 405 with X-Delete-Blocked header ✓" >> $GITHUB_STEP_SUMMARY
          echo "- Extension banner in SR logs ✓" >> $GITHUB_STEP_SUMMARY